name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    defaults:
      run:
        working-directory: python      # the Python package lives here (monorepo)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          # Install the engine extra (numpy/pyayay) so the engine tests run; if
          # it fails on a runner, fall back to the dependency-free core -- the
          # engine tests then self-skip (they guard on `import numpy`/`pyayay`).
          python -m pip install -e .[engine] || python -m pip install -e .
      - name: Test
        run: python -m pytest -q
